<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Web AR — Ultimate Stable Build</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a0f; width: 100vw; height: 100vh; }

    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 9999;
      font-family: system-ui, -apple-system, sans-serif;
      color: #e0e0f0;
      text-align: center;
      padding: 32px;
      background: #0a0a0f;
      transition: opacity 0.5s ease;
    }
    .overlay.hidden { opacity: 0; pointer-events: none; }
    .overlay strong { font-size: 22px; font-weight: 700; }
    
    #start-btn {
      margin-top: 8px;
      padding: 14px 40px;
      border: none;
      border-radius: 32px;
      background: #7c6af7;
      color: #fff;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
    }
    #start-btn:disabled { background: #444; cursor: not-allowed; }

    #hint-banner {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10,10,20,0.85);
      backdrop-filter: blur(8px);
      color: #e0e0f0;
      padding: 12px 24px;
      border-radius: 24px;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      z-index: 1000;
      pointer-events: none;
      border: 1px solid rgba(124,106,247,0.3);
      opacity: 0;
      transition: opacity 0.3s, background-color 0.3s;
    }
    #hint-banner.visible { opacity: 1; }

    /* HARDWARE POSITIONING ARRAYS */
    body > video {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      object-fit: cover !important;
      z-index: 1 !important;
    }

    .a-canvas {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      z-index: 2 !important;
    }
  </style>
</head>
<body>

  <div id="start-screen" class="overlay">
    <div style="font-size: 56px;">🚀</div>
    <strong>Web AR Pipeline</strong>
    <p id="ready-msg">Initializing core components...</p>
    <button id="start-btn" disabled>Loading...</button>
  </div>

  <div id="hint-banner">Scanning for target image...</div>

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: no; uiError: no;"
    embedded
    renderer="colorManagement: true; precision: highp;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-camera position="0 0 0" look-controls="enabled: false" wasd-controls="enabled: false" camera="near: 0.01; far: 100"></a-camera>

    <a-entity id="ar-target" mindar-image-target="targetIndex: 0" scale="2 2 2">
      
      <a-plane position="0 0 0" rotation="0 0 0" width="1" height="1" color="#FF00FF" opacity="0.8"></a-plane>

      <a-box position="0 0 0.2" rotation="0 45 0" width="0.4" height="0.4" depth="0.4" color="#00FFFF"></a-box>

    </a-entity>
  </a-scene>

  <script>
    const startScreen = document.getElementById('start-screen');
    const readyMsg = document.getElementById('ready-msg');
    const hintBanner = document.getElementById('hint-banner');
    const startBtn = document.getElementById('start-btn');
    const scene = document.querySelector('a-scene');
    const arTarget = document.getElementById('ar-target');

    let arSystem = null;

    // Helper checking to secure system loop bindings
    const initAR = () => {
      arSystem = scene.systems['mindar-image-system'];
      if (arSystem) {
        startBtn.disabled = false;
        startBtn.textContent = 'Start AR';
        readyMsg.textContent = 'Hardware connection secure. Tap below to launch.';
      }
    };

    if (scene.hasLoaded) {
      initAR();
    } else {
      scene.addEventListener('loaded', initAR);
    }

    startBtn.addEventListener('click', async () => {
      if (!arSystem) return;
      startScreen.classList.add('hidden');
      hintBanner.classList.add('visible');

      try {
        await arSystem.start();
      } catch (err) {
        alert("Camera failed to initialize: " + err.message);
      }
    });

    // Global pipeline capture monitoring all compiled target index channels
    scene.addEventListener('targetFound', (event) => {
      const foundIndex = event.detail.targetIndex;
      hintBanner.textContent = `🎯 MATCH FOUND (INDEX: ${foundIndex})`;
      hintBanner.style.backgroundColor = "rgba(46, 204, 113, 0.9)";
      
      if (arTarget) {
        arTarget.setAttribute('mindar-image-target', `targetIndex: ${foundIndex}`);
      }
    });

    scene.addEventListener('targetLost', () => {
      hintBanner.textContent = "Scanning for target image...";
      hintBanner.style.backgroundColor = "rgba(10,10,20,0.85)";
    });
  </script>
</body>
</html>
