<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web AR — Direct WebGL Pipeline</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r123/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>

  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }
    #container { width: 100vw; height: 100vh; position: relative; }
    
    /* System layers managed explicitly via absolute viewports */
    #container video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
    #container canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }

    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 9999;
      font-family: system-ui, sans-serif;
      color: #e0e0f0;
      background: #0a0a0f;
    }
    .hidden { display: none !important; }

    #start-btn {
      padding: 14px 40px;
      border: none;
      border-radius: 32px;
      background: #7c6af7;
      color: #fff;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
    }

    #hint-banner {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10,10,20,0.85);
      color: #e0e0f0;
      padding: 12px 24px;
      border-radius: 24px;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      z-index: 1000;
      border: 1px solid rgba(124,106,247,0.3);
      display: none;
    }
  </style>
</head>
<body>

  <div id="start-screen" class="overlay">
    <div style="font-size: 56px;">📷</div>
    <strong>Direct WebGL AR Pipeline</strong>
    <p>Using raw rendering to guarantee compatibility.</p>
    <button id="start-btn">Start AR</button>
  </div>

  <div id="hint-banner">Scanning for target image...</div>
  
  <div id="container"></div>

  <script>
    const startScreen = document.getElementById('start-screen');
    const startBtn = document.getElementById('start-btn');
    const hintBanner = document.getElementById('hint-banner');
    const container = document.getElementById('container');

    startBtn.addEventListener('click', async () => {
      startScreen.classList.add('hidden');
      hintBanner.style.display = 'block';

      // 1. Initialize the baseline MindAR Core Controller
      const mindarThree = new window.MINDAR.IMAGE.MindARThree({
        container: container,
        imageTargetSrc: './targets.mind',
        uiLoading: "no",
        uiScanning: "no"
      });

      const {renderer, scene, camera} = mindarThree;

      // 2. Build a raw, standard hardware-shaded 3D mesh geometry
      const geometry = new THREE.BoxGeometry(0.5, 0.5, 0.5);
      const material = new THREE.MeshBasicMaterial({
        color: 0x00FFFF, 
        wireframe: false,
        side: THREE.DoubleSide
      });
      
      const mesh = new THREE.Mesh(geometry, material);

      // 3. Anchor mesh to target matrix zero
      const anchor = mindarThree.addAnchor(0);
      anchor.group.add(mesh);

      // Hardware Diagnostic Tracking Signals
      anchor.onTargetFound = () => {
        hintBanner.textContent = "🎯 MATCH FOUND!";
        hintBanner.style.backgroundColor = "rgba(46, 204, 113, 0.9)";
      };

      anchor.onTargetLost = () => {
        hintBanner.textContent = "Scanning for target image...";
        hintBanner.style.backgroundColor = "rgba(10,10,20,0.85)";
      };

      // 4. Fire the engine and start the rendering loops
      await mindarThree.start();
      
      renderer.setAnimationLoop(() => {
        // Slow constant calculation loop rotation to verify visual depth
        mesh.rotation.x += 0.01;
        mesh.rotation.y += 0.01;
        renderer.render(scene, camera);
      });
    });
  </script>
</body>
</html>
