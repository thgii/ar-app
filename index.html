<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web AR — Image Tracking</title>

  <!-- =====================================================================
    STEP 1 — CDN SCRIPTS (no build tools needed)
    Load A-Frame first, then the MindAR A-Frame integration.
    Always pin to specific versions so your app doesn't break on updates.
  ====================================================================== -->
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.5.0/dist/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    /* Keep the page edge-to-edge so the camera feed fills the screen */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; }

    /* ── Loading overlay ──────────────────────────────────────────────── */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 9999;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0e0f0;
      transition: opacity 0.6s ease;
    }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }

    .spinner {
      width: 52px; height: 52px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #7c6af7;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #loading-screen p { font-size: 15px; opacity: 0.7; letter-spacing: 0.03em; }
    #loading-screen strong { font-size: 19px; font-weight: 600; }

    /* ── "Point camera" hint banner ───────────────────────────────────── */
    #hint-banner {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10,10,20,0.72);
      backdrop-filter: blur(8px);
      color: #e0e0f0;
      padding: 10px 20px;
      border-radius: 24px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      letter-spacing: 0.04em;
      z-index: 1000;
      pointer-events: none;
      border: 1px solid rgba(124,106,247,0.3);
    }
  </style>
</head>
<body>

  <!-- Loading overlay — shown while MindAR initialises the .mind file -->
  <div id="loading-screen">
    <div class="spinner"></div>
    <strong>Starting AR…</strong>
    <p>Please allow camera access when prompted.</p>
  </div>

  <!-- Hint shown after loading completes -->
  <div id="hint-banner">📷 Point your camera at the target image</div>

  <!-- ===================================================================
    STEP 2 — A-FRAME SCENE
    a-scene carries the special MindAR attributes:
      • mindar-image  — activates image tracking
      • embedded      — fills the parent element (full screen)
      • vr-mode-ui    — hides the default VR headset button
      • device-orientation-permission-ui — hides the iOS gyro prompt
  ==================================================================== -->
  <a-scene
    mindar-image="
      imageTargetSrc: ./targets.mind;
      autoStart: true;
      uiLoading: no;
      uiScanning: no;
      uiError: no;
      filterMinCF: 0.001;
      filterBeta: 0.01;
      warmupTolerance: 5;
      missTolerance: 5
    "
    embedded
    renderer="colorManagement: true; physicallyCorrectLights: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >

    <!-- ── Assets ───────────────────────────────────────────────────────
      Preload any external assets here (GLB models, images, sounds).
      A-Frame waits until all assets are loaded before starting the scene.

      CUSTOMISATION ▶ To use a 3-D GLB model instead of (or alongside)
      the text, uncomment the <a-asset-item> tag below and set src to
      your own .glb file path. Then see the <a-gltf-model> tag further
      down in the scene.
    ──────────────────────────────────────────────────────────────────── -->
    <a-assets>
      <!-- <a-asset-item id="my-model" src="./my-model.glb"></a-asset-item> -->
    </a-assets>

    <!-- ── Camera ───────────────────────────────────────────────────────
      MindAR hijacks this camera to drive the AR view. Leave it as-is.
    ──────────────────────────────────────────────────────────────────── -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- =================================================================
      STEP 3 — IMAGE TARGET ENTITY
      <a-entity mindar-image-target="targetIndex: 0"> links this group
      of 3-D objects to the FIRST image in your .mind file.

      If you compiled multiple images into one .mind file:
        • Image 1 → targetIndex: 0
        • Image 2 → targetIndex: 1
        • Image 3 → targetIndex: 2  …and so on.

      Everything INSIDE this entity is positioned relative to the centre
      of the physical target image. The target image's shorter edge is
      normalised to 1 A-Frame unit wide.
    ================================================================== -->
    <a-entity mindar-image-target="targetIndex: 0">

      <!-- ── 3-D Text label ──────────────────────────────────────────────
        position  : X  Y  Z  (Y=0.15 floats it just above the target)
        rotation  : -90 on X rotates the text to lie flat relative to the
                    target, then 0 on Y/Z keeps it facing the camera.
        color     : hex or CSS colour name
        width     : controls text wrapping width in scene units
        align     : left | center | right

        CUSTOMISATION ▶ Change the "value" attribute to your own text.
      ──────────────────────────────────────────────────────────────────── -->
      <a-text
        value="Hello, AR World!"
        position="0 0.15 0"
        rotation="-90 0 0"
        color="#7c6af7"
        width="1.6"
        align="center"
        font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
        animation="property: rotation;
                   from: -90 0 0;
                   to: -90 360 0;
                   dur: 6000;
                   easing: linear;
                   loop: true"
      ></a-text>

      <!-- ── Decorative ring ─────────────────────────────────────────────
        A flat torus (donut) that pulses gently underneath the text.
        Remove or restyle as you like.
      ──────────────────────────────────────────────────────────────────── -->
      <a-torus
        position="0 0 0"
        rotation="-90 0 0"
        radius="0.4"
        radius-tubular="0.01"
        color="#7c6af7"
        opacity="0.6"
        animation="property: scale;
                   from: 1 1 1;
                   to: 1.15 1.15 1.15;
                   dur: 1200;
                   direction: alternate;
                   easing: easeInOutSine;
                   loop: true"
      ></a-torus>

      <!-- ── Floating sphere ────────────────────────────────────────────
        A small metallic sphere bobbing above the ring.
        Remove or restyle as you like.
      ──────────────────────────────────────────────────────────────────── -->
      <a-sphere
        position="0 0.32 0"
        radius="0.07"
        color="#f7c86a"
        metalness="0.8"
        roughness="0.2"
        animation="property: position;
                   from: 0 0.28 0;
                   to: 0 0.38 0;
                   dur: 1400;
                   direction: alternate;
                   easing: easeInOutSine;
                   loop: true"
      ></a-sphere>

      <!-- ── GLB model (uncomment to use) ─────────────────────────────────
        If you'd rather display a 3-D model than the primitives above,
        uncomment the block below and delete (or keep) the shapes above.

        CUSTOMISATION ▶
          1. Place your .glb file in the same folder as index.html.
          2. Add <a-asset-item id="my-model" src="./my-model.glb"> in
             the <a-assets> block near the top.
          3. Uncomment the tag below and adjust position / scale.

      <a-gltf-model
        src="#my-model"
        position="0 0.1 0"
        rotation="-90 0 0"
        scale="0.5 0.5 0.5"
        animation-mixer="clip: *; loop: repeat"
      ></a-gltf-model>
      ──────────────────────────────────────────────────────────────────── -->

    </a-entity>
    <!-- END image target -->

  </a-scene>

  <!-- ===================================================================
    STEP 4 — JAVASCRIPT: hide loading screen once MindAR is ready
  ==================================================================== -->
  <script>
    const loadingScreen = document.getElementById('loading-screen');
    const hintBanner    = document.getElementById('hint-banner');

    // MindAR fires 'arReady' on the <a-scene> element when the .mind file
    // is parsed and the camera feed is live.
    document.querySelector('a-scene').addEventListener('arReady', () => {
      loadingScreen.classList.add('hidden');
    });

    // If something goes wrong (e.g. camera denied, bad .mind file),
    // show a friendly error instead of a blank screen.
    document.querySelector('a-scene').addEventListener('arError', () => {
      loadingScreen.innerHTML = `
        <strong style="color:#f77c6a;">AR failed to start</strong>
        <p>Check that camera permission is granted<br>and the file is served over HTTPS.</p>
      `;
    });

    // Auto-hide the hint banner after 6 seconds
    setTimeout(() => {
      hintBanner.style.transition = 'opacity 1s ease';
      hintBanner.style.opacity = '0';
    }, 6000);
  </script>

</body>
</html>

<!--
╔══════════════════════════════════════════════════════════════════════════╗
║  QUICK REFERENCE — WHERE TO CHANGE THINGS                               ║
╠══════════════════════════════════════════════════════════════════════════╣
║  .mind file path  │ mindar-image attribute → imageTargetSrc: ./targets.mind
║  Target index     │ mindar-image-target    → targetIndex: 0 (0 = first image)
║  AR text          │ <a-text>               → value="…"
║  Text colour      │ <a-text>               → color="#7c6af7"
║  Ring colour      │ <a-torus>              → color="#7c6af7"
║  Sphere colour    │ <a-sphere>             → color="#f7c86a"
║  3-D model        │ uncomment <a-gltf-model> + <a-asset-item>
╚══════════════════════════════════════════════════════════════════════════╝
-->
