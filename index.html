<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web AR — Image Tracking</title>

  <!--
    FIX 1 — SCRIPT LOADING ORDER
    ─────────────────────────────
    The previous version loaded both scripts without guaranteeing order.
    MindAR was executing before A-Frame finished, causing:
      "Uncaught ReferenceError: AFRAME is not defined"

    The fix: load A-Frame FIRST with no special attributes (blocking),
    then load MindAR after it. This guarantees A-Frame is fully defined
    before MindAR tries to register its A-Frame components.

    We also switched A-Frame to the official aframe.io CDN which is
    more reliable than jsdelivr for this library.
  -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a0f; }

    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 9999;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0e0f0;
      text-align: center;
      padding: 32px;
      background: #0a0a0f;
      transition: opacity 0.5s ease;
    }
    .overlay.hidden { opacity: 0; pointer-events: none; }
    .overlay strong  { font-size: 22px; font-weight: 700; }
    .overlay p       { font-size: 15px; opacity: 0.7; line-height: 1.6; }

    #start-screen .icon { font-size: 56px; margin-bottom: 4px; }
    #start-btn {
      margin-top: 8px;
      padding: 14px 40px;
      border: none;
      border-radius: 32px;
      background: #7c6af7;
      color: #fff;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(124,106,247,0.4);
    }
    #start-btn:active { transform: scale(0.96); }

    .spinner {
      width: 52px; height: 52px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #7c6af7;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #hint-banner {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10,10,20,0.72);
      backdrop-filter: blur(8px);
      color: #e0e0f0;
      padding: 10px 20px;
      border-radius: 24px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      z-index: 1000;
      pointer-events: none;
      border: 1px solid rgba(124,106,247,0.3);
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    #hint-banner.visible { opacity: 1; }
  </style>
</head>
<body>

  <div id="start-screen" class="overlay">
    <div class="icon">📷</div>
    <strong>Web AR Experience</strong>
    <p>Tap the button below to start.<br>Allow camera access when Chrome asks.</p>
    <button id="start-btn">Start AR</button>
  </div>

  <div id="loading-screen" class="overlay hidden">
    <div class="spinner"></div>
    <strong>Loading…</strong>
    <p id="status-msg">Setting up the AR engine.</p>
  </div>

  <div id="hint-banner">📷 Point your camera at the target image</div>

  <!--
    FIX 2 — .MIND FILE PATH
    ────────────────────────
    CUSTOMISATION ▶ Set imageTargetSrc to the path of your .mind file.

    If your GitHub repo looks like this:
      your-repo/
      ├── index.html
      └── targets.mind
    → use:  imageTargetSrc: ./targets.mind

    If targets.mind is in a subfolder:
      your-repo/
      ├── index.html
      └── assets/
          └── targets.mind
    → use:  imageTargetSrc: ./assets/targets.mind

    To double-check: visit the full URL to your .mind file directly in
    the browser. It should trigger a download. If you get a 404, the
    path is wrong.
      e.g. https://username.github.io/repo-name/targets.mind
  -->
  <a-scene
    mindar-image="
      imageTargetSrc: ./targets.mind;
      autoStart: false;
      uiLoading: no;
      uiScanning: no;
      uiError: no;
      filterMinCF: 0.001;
      filterBeta: 0.01;
      warmupTolerance: 5;
      missTolerance: 5
    "
    embedded
    renderer="colorManagement: true; physicallyCorrectLights: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <!-- Uncomment to preload a GLB model:
      <a-asset-item id="my-model" src="./my-model.glb"></a-asset-item>
      -->
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">

      <!-- CUSTOMISATION ▶ Change value="…" to your own text -->
      <a-text
        value="Hello, AR World!"
        position="0 0.15 0"
        rotation="-90 0 0"
        color="#7c6af7"
        width="1.6"
        align="center"
        font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
        animation="property: rotation;
                   from: -90 0 0;
                   to: -90 360 0;
                   dur: 6000;
                   easing: linear;
                   loop: true"
      ></a-text>

      <a-torus
        position="0 0 0"
        rotation="-90 0 0"
        radius="0.4"
        radius-tubular="0.01"
        color="#7c6af7"
        opacity="0.6"
        animation="property: scale;
                   from: 1 1 1;
                   to: 1.15 1.15 1.15;
                   dur: 1200;
                   direction: alternate;
                   easing: easeInOutSine;
                   loop: true"
      ></a-torus>

      <a-sphere
        position="0 0.32 0"
        radius="0.07"
        color="#f7c86a"
        metalness="0.8"
        roughness="0.2"
        animation="property: position;
                   from: 0 0.28 0;
                   to: 0 0.38 0;
                   dur: 1400;
                   direction: alternate;
                   easing: easeInOutSine;
                   loop: true"
      ></a-sphere>

      <!-- Uncomment to use a GLB model:
      <a-gltf-model
        src="#my-model"
        position="0 0.1 0"
        rotation="-90 0 0"
        scale="0.5 0.5 0.5"
        animation-mixer="clip: *; loop: repeat"
      ></a-gltf-model>
      -->

    </a-entity>
  </a-scene>

  <script>
    const startScreen   = document.getElementById('start-screen');
    const loadingScreen = document.getElementById('loading-screen');
    const statusMsg     = document.getElementById('status-msg');
    const hintBanner    = document.getElementById('hint-banner');
    const startBtn      = document.getElementById('start-btn');
    const scene         = document.querySelector('a-scene');

    function setStatus(msg) { statusMsg.textContent = msg; }

    function showError(title, detail) {
      loadingScreen.classList.remove('hidden');
      loadingScreen.innerHTML = `
        <div style="text-align:center;padding:0 24px;">
          <div style="font-size:40px;margin-bottom:12px;">⚠️</div>
          <strong style="color:#f77c6a;font-size:18px;">${title}</strong>
          <p style="margin-top:12px;line-height:1.6;opacity:0.8;">${detail}</p>
          <button onclick="location.reload()"
            style="margin-top:24px;padding:12px 32px;border:none;border-radius:24px;
                   background:#7c6af7;color:#fff;font-size:16px;cursor:pointer;">
            Try Again
          </button>
        </div>
      `;
    }

    startBtn.addEventListener('click', async () => {
      startScreen.classList.add('hidden');
      loadingScreen.classList.remove('hidden');
      setStatus('Checking files…');

      // Verify targets.mind is reachable before handing off to MindAR
      try {
        const res = await fetch('./targets.mind', { method: 'HEAD' });
        if (!res.ok) {
          showError(
            'targets.mind not found (404)',
            'Make sure <strong>targets.mind</strong> is in the same folder as index.html on GitHub. ' +
            'Visit <code>https://YOUR-USERNAME.github.io/YOUR-REPO/targets.mind</code> to confirm.'
          );
          return;
        }
      } catch {
        showError(
          'Could not reach targets.mind',
          'Check the filename is exactly <code>targets.mind</code> (lowercase) and is in the repo root.'
        );
        return;
      }

      setStatus('Requesting camera access…');

      // ar.start() is called inside a click handler — this satisfies
      // Chrome's user-gesture requirement for camera permission prompts.
      try {
        const arSystem = scene.systems['mindar-image-system'];
        await arSystem.start();
      } catch (err) {
        const msg = (err && err.message) ? err.message.toLowerCase() : '';
        if (msg.includes('notallowed') || msg.includes('permission') || msg.includes('denied')) {
          showError(
            'Camera access was denied',
            'Tap <strong>Try Again</strong> and then tap <em>Allow</em> when Chrome asks. ' +
            'Or: Chrome address bar → lock icon → Site settings → Camera → Allow.'
          );
        } else {
          showError('AR failed to start', 'Error: ' + (err && err.message ? err.message : err));
        }
      }
    });

    scene.addEventListener('arReady', () => {
      loadingScreen.classList.add('hidden');
      hintBanner.classList.add('visible');
      setTimeout(() => {
        hintBanner.style.transition = 'opacity 1s ease';
        hintBanner.style.opacity = '0';
      }, 6000);
    });

    scene.addEventListener('arError', (evt) => {
      const detail = String(evt.detail || '').toLowerCase();
      if (detail.includes('notallowed') || detail.includes('camera')) {
        showError(
          'Camera access was denied',
          'Tap <strong>Try Again</strong> and allow camera access when prompted.'
        );
      } else {
        showError('AR failed to start', 'Detail: ' + (evt.detail || 'unknown'));
      }
    });
  </script>

</body>
</html>

<!--
╔══════════════════════════════════════════════════════════════════════════╗
║  QUICK REFERENCE — WHERE TO CHANGE THINGS                               ║
╠══════════════════════════════════════════════════════════════════════════╣
║  .mind file path  │ mindar-image → imageTargetSrc: ./targets.mind       ║
║  Target index     │ mindar-image-target → targetIndex: 0                ║
║  AR text          │ <a-text> → value="…"                                ║
║  Text colour      │ <a-text> → color="#7c6af7"                          ║
║  Ring colour      │ <a-torus> → color="#7c6af7"                         ║
║  Sphere colour    │ <a-sphere> → color="#f7c86a"                        ║
║  3-D model        │ uncomment <a-gltf-model> + <a-asset-item>           ║
╚══════════════════════════════════════════════════════════════════════════╝
-->
