<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web AR — Image Tracking</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a0f; }

    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 9999;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0e0f0;
      text-align: center;
      padding: 32px;
      background: #0a0a0f;
      transition: opacity 0.5s ease;
    }
    .overlay.hidden { opacity: 0; pointer-events: none; }
    .overlay strong { font-size: 22px; font-weight: 700; }
    .overlay p      { font-size: 15px; opacity: 0.7; line-height: 1.6; }

    #start-btn {
      margin-top: 8px;
      padding: 14px 40px;
      border: none;
      border-radius: 32px;
      background: #7c6af7;
      color: #fff;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(124,106,247,0.4);
    }
    #start-btn:disabled { background: #444; box-shadow: none; cursor: not-allowed; }

    .spinner {
      width: 52px; height: 52px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #7c6af7;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #hint-banner {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10,10,20,0.85);
      backdrop-filter: blur(8px);
      color: #e0e0f0;
      padding: 12px 24px;
      border-radius: 24px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      z-index: 1000;
      pointer-events: none;
      border: 1px solid rgba(124,106,247,0.3);
      opacity: 0;
      transition: opacity 0.3s, background-color 0.3s;
    }
    #hint-banner.visible { opacity: 1; }
  </style>
</head>
<body>

  <div id="start-screen" class="overlay">
    <div style="font-size: 56px;">📷</div>
    <strong>Web AR Experience</strong>
    <p id="ready-msg">Getting ready…</p>
    <button id="start-btn" disabled>Getting ready…</button>
  </div>

  <div id="loading-screen" class="overlay hidden">
    <div class="spinner"></div>
    <strong>Loading Engine…</strong>
    <p id="status-msg">Setting up target files.</p>
  </div>

  <div id="hint-banner">Scanning for target image...</div>

<a-scene
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: no; uiError: no;"
    embedded
    renderer="colorManagement: false; precision: mediump;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets></a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>

    <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
      
      <a-plane 
        position="0 0 0" 
        rotation="0 0 0" 
        width="1" 
        height="1" 
        color="#FF00FF" 
        opacity="0.9"
      ></a-plane>

      <a-box 
        position="0 0 0.1" 
        rotation="0 0 0" 
        width="0.3" 
        height="0.3" 
        depth="0.3" 
        color="#00FFFF"
      ></a-box>

    </a-entity>
  </a-scene>

  <script>
    const startScreen   = document.getElementById('start-screen');
    const loadingScreen = document.getElementById('loading-screen');
    const statusMsg      = document.getElementById('status-msg');
    const readyMsg       = document.getElementById('ready-msg');
    const hintBanner    = document.getElementById('hint-banner');
    const startBtn      = document.getElementById('start-btn');
    const scene         = document.querySelector('a-scene');
    const arTarget      = document.getElementById('ar-target');

    let arSystem = null;

    scene.addEventListener('loaded', () => {
      arSystem = scene.systems['mindar-image-system'];
      if (!arSystem) {
        readyMsg.textContent = 'AR failed to init. Please refresh.';
        return;
      }
      startBtn.disabled = false;
      startBtn.textContent = 'Start AR';
      readyMsg.textContent = 'Ready! Make sure your target image is printed or open on a nearby screen.';
    });

    startBtn.addEventListener('click', async () => {
      if (!arSystem) return;
      startScreen.classList.add('hidden');
      loadingScreen.classList.remove('hidden');
      statusMsg.textContent = 'Verifying target signatures...';

      try {
        const res = await fetch('./targets.mind', { method: 'HEAD' });
        if (!res.ok) throw new Error();
      } catch {
        showError('Target Missing', 'Ensure your file is named precisely "targets.mind" in the same directory.');
        return;
      }

      statusMsg.textContent = 'Opening Camera...';
      try {
        await arSystem.start();
      } catch (err) {
        showError('Camera Error', err.message || 'Permission denied.');
      }
    });

    scene.addEventListener('arReady', () => {
      loadingScreen.classList.add('hidden');
      hintBanner.classList.add('visible');
    });

    // ── Visual Hardware Diagnostics ──
    // These fire directly off the computer vision events to bypass 3D camera issues
    arTarget.addEventListener('targetFound', () => {
      hintBanner.textContent = "🎯 MATCH FOUND!";
      hintBanner.style.backgroundColor = "rgba(46, 204, 113, 0.9)"; // Flashes Green
      hintBanner.classList.add('visible');
    });

    arTarget.addEventListener('targetLost', () => {
      hintBanner.textContent = "Scanning for target image...";
      hintBanner.style.backgroundColor = "rgba(10,10,20,0.85)"; // Reverts to dark tint
    });

    function showError(title, detail) {
      loadingScreen.classList.remove('hidden');
      loadingScreen.innerHTML = `
        <div style="text-align:center;padding:32px;">
          <div style="font-size:40px;">⚠️</div>
          <strong style="color:#f77c6a;">${title}</strong>
          <p style="margin-top:12px;opacity:0.8;">${detail}</p>
          <button onclick="location.reload()" style="margin-top:20px;padding:10px 24px;background:#7c6af7;color:#fff;border:none;border-radius:20px;">Retry</button>
        </div>`;
    }
  </script>
</body>
</html>
